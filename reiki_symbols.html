<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reiki Symbol Practice</title>

<style>
    body {
        margin: 0;
        background: #111827;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    h1 {
        margin-top: 20px;
        font-weight: 300;
        letter-spacing: 2px;
    }

    .controls {
        margin: 20px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
    }

    button {
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #374151;
        color: white;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
    }

    button:hover {
        background: #4b5563;
    }

    .canvas-container {
        width: 700px;
        max-width: 90vw;
        height: 700px;
        background: #1f2937;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
        margin-bottom: 40px;
    }

    svg {
        width: 80%;
        height: 80%;
    }

    path {
        fill: none;
        stroke: #f9fafb;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .draw {
        animation: draw 6s linear forwards;
    }

    @keyframes draw {
        from {
            stroke-dashoffset: var(--length);
        }
        to {
            stroke-dashoffset: 0;
        }
    }

    .subtitle {
        color: #9ca3af;
        margin-top: -10px;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<h1>Reiki Symbol Practice</h1>
<div class="subtitle">Animated Drawing Reference</div>

<div class="controls">
    <button onclick="loadSymbol('choKuRei')">Cho Ku Rei</button>
    <button onclick="loadSymbol('seiHeKi')">Sei He Ki</button>
    <button onclick="loadSymbol('honShaZeShoNen')">Hon Sha Ze Sho Nen</button>
    <button onclick="loadSymbol('daiKoMyo')">Dai Ko Myo</button>
    <button onclick="replay()">Replay Animation</button>
</div>

<div class="canvas-container">
    <svg id="svg" viewBox="0 0 600 600"></svg>
</div>

<script>

const symbols = {

    choKuRei: `
        <path d="M300 80 L300 500" />
        <path d="
            M300 140
            C450 140, 470 280, 350 320
            C220 360, 230 470, 330 500
        "/>
    `,

    seiHeKi: `
        <path d="
            M220 100
            C350 100, 380 180, 300 240
            C220 300, 220 420, 340 500
        "/>

        <path d="M180 180 L420 180" />

        <path d="M300 180 L300 520" />
    `,

    honShaZeShoNen: `
        <path d="M150 80 L450 80" />
        <path d="M300 80 L300 500" />
        <path d="M170 200 L430 200" />
        <path d="M170 320 L430 320" />
        <path d="
            M200 500
            C300 560, 420 540, 450 440
        "/>
    `,

    daiKoMyo: `
        <path d="M120 80 L480 80" />
        <path d="M300 80 L300 500" />
        <path d="
            M300 170
            m -90 0
            a 90 90 0 1 0 180 0
            a 90 90 0 1 0 -180 0
        "/>
        <path d="M170 500 L430 500" />
        <path d="M220 560 L380 560" />
    `
};

const svg = document.getElementById("svg");
let current = 'choKuRei';

function prepareAnimation() {
    const paths = document.querySelectorAll("path");

    paths.forEach((path, index) => {
        const length = path.getTotalLength();

        path.style.strokeDasharray = length;
        path.style.strokeDashoffset = length;
        path.style.setProperty('--length', length);

        path.classList.remove('draw');

        setTimeout(() => {
            path.classList.add('draw');
        }, index * 1200);
    });
}

function loadSymbol(name) {
    current = name;
    svg.innerHTML = symbols[name];
    prepareAnimation();
}

function replay() {
    loadSymbol(current);
}

loadSymbol('choKuRei');

</script>

</body>
</html>
